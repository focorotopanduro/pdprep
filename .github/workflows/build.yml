name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PDPrep.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDPrep-apk
          path: app/build/outputs/apk/debug/PDPrep.apk
          retention-days: 60

      - name: Publish APK to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest build
          tag_name: latest
          files: app/build/outputs/apk/debug/PDPrep.apk
          body: |
            PD Prep — floating overlay cheat sheet.
            Download **PDPrep.apk** below on your phone and tap to install.
            Each push to main replaces this release automatically.
